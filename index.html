<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Gadgets - Best Tech Deals & Reviews</title>
    <style>
        /* ============================================
           RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        /* ============================================
           HEADER
           ============================================ */
        header {
            background: linear-gradient(135deg, #232f3e 0%, #131921 100%);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 1.1rem;
            color: #cccccc;
            font-weight: 300;
        }

        /* ============================================
           MAIN CONTENT CONTAINER
           ============================================ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ============================================
           LOADING & ERROR STATES
           ============================================ */
        .loading, .error {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.1rem;
            color: #666;
        }

        .error {
            color: #e74c3c;
        }

        /* ============================================
           FEATURED PRODUCT SECTION
           ============================================ */
        .featured-product {
            display: flex;
            gap: 40px;
            background: white;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 50px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            align-items: center;
        }

        .featured-product .product-image {
            flex: 0 0 45%;
            max-width: 500px;
        }

        .featured-product .product-image img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
            aspect-ratio: 1 / 1;
        }

        .featured-product .product-details {
            flex: 1;
        }

        .featured-product .badge {
            display: inline-block;
            background: #ff9900;
            color: #131921;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .featured-product h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #232f3e;
            line-height: 1.3;
        }

        .featured-product .description {
            font-size: 1rem;
            color: #555;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .featured-product .price {
            font-size: 2rem;
            font-weight: 700;
            color: #232f3e;
            margin-bottom: 24px;
        }

        .btn-amazon {
            display: inline-block;
            background: #ff9900;
            color: #131921;
            padding: 16px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-amazon:hover {
            background: #e68a00;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 153, 0, 0.3);
        }

        /* ============================================
           RELATED PRODUCTS SECTION
           ============================================ */
        .related-section h3 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: #232f3e;
            text-align: center;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
        }

        .product-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .product-card .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .product-card h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #232f3e;
            flex: 1;
        }

        .product-card .btn-amazon {
            width: 100%;
            text-align: center;
            padding: 14px;
            font-size: 0.95rem;
        }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 0.9rem;
            margin-top: 40px;
        }

        /* ============================================
           RESPONSIVE: MOBILE
           ============================================ */
        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; }
            header p { font-size: 0.95rem; }
            
            .featured-product {
                flex-direction: column;
                padding: 24px;
                gap: 24px;
            }
            
            .featured-product .product-image {
                flex: none;
                max-width: 100%;
            }
            
            .featured-product h2 { font-size: 1.5rem; }
            .featured-product .price { font-size: 1.5rem; }
            
            .container { padding: 24px 16px; }
            
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 16px;
            }
        }

        @media (max-width: 480px) {
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <h1>Tech Gadgets</h1>
        <p>Best Tech Deals & Reviews</p>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">

        <!-- Loading message shown while data is being fetched -->
        <div id="loading" class="loading">Loading products...</div>

        <!-- Featured Product Section (first product from JSON) -->
        <div id="featured-product" style="display: none;"></div>

        <!-- Related Products Section (remaining products from JSON) -->
        <div id="related-section" class="related-section" style="display: none;">
            <h3>More Tech Gadgets</h3>
            <div id="product-grid" class="product-grid"></div>
        </div>

    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>Tech Gadgets is a participant in the Amazon Services LLC Associates Program.</p>
    </footer>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        /**
         * ==========================================================
         * HOW TO ADD NEW PRODUCTS:
         * 
         * 1. Open "posts.json" in any text editor
         * 2. Add a new product object inside the "products" array
         * 3. Each product needs these fields:
         *    - title:        Product name
         *    - image:        URL to product image
         *    - description:  Short product description
         *    - price:        Price string (e.g., "$29.99")
         *    - affiliate_link: Your Amazon affiliate link
         * 
         * 4. Save the file and refresh the page - new product appears!
         * 
         * WHERE TO GET AMAZON AFFILIATE LINKS:
         * - Log into your Amazon Associates account
         * - Search for a product, click "Get Link"
         * - Copy the full link and paste it as "affiliate_link"
         * ==========================================================
         */

        async function loadProducts() {
            try {
                // Fetch products from posts.json with cache-busting
                const response = await fetch("posts.json?t=" + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error("Could not load products. Make sure posts.json is in the same folder.");
                }

                const data = await response.json();
                const products = data.products;

                // Hide loading message
                document.getElementById("loading").style.display = "none";

                if (!products || products.length === 0) {
                    document.getElementById("loading").style.display = "block";
                    document.getElementById("loading").textContent = "No products found. Add some to posts.json!";
                    return;
                }

                // ===== DISPLAY FEATURED PRODUCT (first in the list) =====
                const featured = products[0];
                const featuredHTML = `
                    <div class="featured-product">
                        <div class="product-image">
                            <img src="${featured.image}" alt="${featured.title}" 
                                 onerror="this.src='https://via.placeholder.com/500x500?text=No+Image'">
                        </div>
                        <div class="product-details">
                            <span class="badge">Featured</span>
                            <h2>${featured.title}</h2>
                            <p class="description">${featured.description}</p>
                            <div class="price">${featured.price}</div>
                            <a href="${featured.affiliate_link}" target="_blank" rel="noopener noreferrer" class="btn-amazon">
                                Buy on Amazon
                            </a>
                        </div>
                    </div>
                `;
                document.getElementById("featured-product").innerHTML = featuredHTML;
                document.getElementById("featured-product").style.display = "block";

                // ===== DISPLAY RELATED PRODUCTS (remaining products) =====
                if (products.length > 1) {
                    const relatedContainer = document.getElementById("product-grid");
                    let relatedHTML = "";

                    for (let i = 1; i < products.length; i++) {
                        const product = products[i];
                        relatedHTML += `
                            <div class="product-card">
                                <img src="${product.image}" alt="${product.title}"
                                     onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'">
                                <div class="card-body">
                                    <h4>${product.title}</h4>
                                    <a href="${product.affiliate_link}" target="_blank" rel="noopener noreferrer" class="btn-amazon">
                                        View on Amazon
                                    </a>
                                </div>
                            </div>
                        `;
                    }

                    relatedContainer.innerHTML = relatedHTML;
                    document.getElementById("related-section").style.display = "block";
                }

            } catch (error) {
                console.error("Error loading products:", error);
                document.getElementById("loading").className = "error";
                document.getElementById("loading").textContent = "Error: " + error.message;
            }
        }

        // Run when the page loads
        loadProducts();
    </script>

</body>
</html>
